<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200"
     height="400"
     viewBox="0 0 1200 400"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(60,60) scale(1.1)">
    <!-- Left Page -->
    <path d="M40 70
             C40 55, 65 50, 95 55
             L120 60
             L120 200
             L95 195
             C65 190, 40 195, 40 175
             Z"
          fill="url(#logoGradient)"/>

    <!-- Right Page -->
    <path d="M216 70
             C216 55, 191 50, 161 55
             L136 60
             L136 200
             L161 195
             C191 190, 216 195, 216 175
             Z"
          fill="url(#logoGradient)"/>

    <!-- Center -->
    <line x1="128" y1="60" x2="128" y2="200"
          stroke="#6366F1" stroke-width="5"/>

    <!-- Mates -->
    <circle cx="95" cy="95" r="14" fill="#4F46E5"/>
    <circle cx="161" cy="95" r="14" fill="#7C3AED"/>
  </g>

  <!-- Brand Name -->
  <text x="360" y="245"
        font-size="140"
        font-weight="800"
        font-family="Inter, Poppins, Segoe UI, Arial, sans-serif"
        fill="url(#logoGradient)">
    Librarymates
  </text>
</svg>
